spring:
  application:
    name: car-management-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/car_management}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8090}

app:
  jwt:
    secret: ${JWT_SECRET:4gp0Bh9CZhbkrawDMlrLj1gERVJY6F5}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
