services:
  postgres:
    image: postgres:16-alpine
    container_name: car_management_postgres
    environment:
      POSTGRES_DB: car_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d car_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./prueba
    container_name: car_management_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/car_management
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: local-docker-secret-change-me-to-at-least-32-characters
      JWT_EXPIRATION_MINUTES: 120
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      SERVER_PORT: 8090
    ports:
      - "8090:8090"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8090/api
    container_name: car_management_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
